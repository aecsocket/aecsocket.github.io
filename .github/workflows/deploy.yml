name: "Deploy"

on: [ "push" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16.x

      - name: "Install dependencies"
        run: npm install
      - name: "Build"
        run: npm run build

      - name: "Publish"
        uses: "JamesIves/github-pages-deploy-action@v4.3.3"
        with:
          branch: gh-pages
          folder: build
